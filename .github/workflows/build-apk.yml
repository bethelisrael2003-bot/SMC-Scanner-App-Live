name: Build Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create local.properties
        run: |
          echo "storePassword=WhJ3Zqn9w9nclShz" > android/local.properties
          echo "keyPassword=WhJ3Zqn9w9nclShz" >> android/local.properties
          echo "keyAlias=smc-scanner" >> android/local.properties
          echo "storeFile=smc-scanner-release.keystore" >> android/local.properties

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
