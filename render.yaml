services:
  - type: web
    name: smc-scanner-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build && pip install -r requirements.txt
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CAPITAL_API_KEY
        sync: false
      - key: CAPITAL_EMAIL
        sync: false
      - key: CAPITAL_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true
